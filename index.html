<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Realtime</title>
    <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📱 Sistem Absensi Realtime</h1>
            <div class="user-info">
                <input type="text" id="employeeId" placeholder="ID Karyawan" maxlength="10">
                <input type="text" id="employeeName" placeholder="Nama Lengkap">
                <button onclick="saveEmployeeInfo()">Simpan Info</button>
            </div>
        </header>

        <div class="main-content">
            <!-- Scanner Section -->
            <div class="scanner-section">
                <div class="video-container" id="videoContainer">
                    <video id="video" autoplay muted playsinline></video>
                    <canvas id="canvas" style="display:none;"></canvas>
                    <div class="scanner-overlay">
                        <div class="scan-frame"></div>
                        <p>Scan QR Code ID Karyawan</p>
                    </div>
                </div>
                <div class="action-buttons">
                    <button id="checkInBtn" class="btn btn-success" onclick="checkIn()">✅ Check In</button>
                    <button id="checkOutBtn" class="btn btn-danger" onclick="checkOut()" disabled>🚪 Check Out</button>
                </div>
            </div>

            <!-- Status Section -->
            <div class="status-section" id="statusSection">
                <div id="statusMessage"></div>
                <div id="todayAttendance"></div>
            </div>

            <!-- Reports Section -->
            <div class="reports-section">
                <h3>📊 Laporan Absensi</h3>
                <div class="report-controls">
                    <input type="date" id="reportDate" onchange="loadReport()">
                    <select id="reportType" onchange="loadReport()">
                        <option value="daily">Harian</option>
                        <option value="monthly">Bulanan</option>
                    </select>
                    <button onclick="exportReport()" class="btn btn-primary">📄 Export Excel</button>
                    <button onclick="printReport()" class="btn btn-secondary">🖨️ Cetak</button>
                </div>
                <div id="reportTable"></div>
                <canvas id="attendanceChart" style="max-height: 300px;"></canvas>
            </div>
        </div>
    </div>

    <!-- Google Sheets Integration Modal -->
    <div id="sheetsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>Google Sheets Integration</h3>
            <p>Masukkan Google Apps Script Web App URL:</p>
            <input type="url" id="sheetsUrl" placeholder="https://script.google.com/macros/s/.../exec">
            <button onclick="saveSheetsUrl()">Simpan</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
